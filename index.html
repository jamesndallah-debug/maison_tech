<!DOCTYPE html> 
 <html lang="en"> 
 <head> 
   <meta charset="UTF-8"> 
   <title>Maison Tech</title> 
 
   <style> 
     body { 
       margin: 0; 
       font-family: Arial, sans-serif; 
       background: #f5f5f5; 
     } 
 
     /* HEADER */ 
     .pos-header { 
       display: flex; 
       justify-content: space-between; 
       align-items: center; 
       background: #111; 
       padding: 10px 20px; 
       color: white; 
     } 
 
     .left { 
       display: flex; 
       align-items: center; 
       gap: 10px; 
     } 
 
     .logo { 
       width: 50px; 
       height: auto; 
     } 
 
     h2 { 
       margin: 0; 
       color: gold; 
     } 
 
     small { 
       color: #aaa; 
     } 
 
     .right { 
       font-size: 14px; 
     } 
 
     /* MAIN */ 
     .main { 
       padding: 20px; 
       text-align: center; 
     } 
 
     .main img { 
       width: 300px; 
       max-width: 90%; 
     } 
   </style> 
 </head> 
 
 <body> 
 
   <!-- HEADER --> 
   <header class="pos-header"> 
     <div class="left"> 
       <img src="images/maison-tech-logo.png.jpeg" class="logo" alt="Maison Tech Logo"> 
       <div> 
         <h2>MAISON TECH</h2> 
         <small>Where Technology Feels at Home</small> 
       </div> 
     </div> 
 
     <div class="right"> 
       Cashier: Admin 
     </div> 
   </header> 
 
   <!-- MAIN CONTENT --> 
   <div class="main"> 
     <h1>Welcome to Maison Tech POS System</h1> 
     <p>Your system is ready 🚀</p> 
 
     <!-- Big Logo Display --> 
     <img src="images/maison-tech-logo.png.jpeg" alt="Maison Tech Logo"> 
   </div> 
 
 </body> 
 </html>
